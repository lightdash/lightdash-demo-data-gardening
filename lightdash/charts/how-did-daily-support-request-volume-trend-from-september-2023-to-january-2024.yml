          type: scatter
          yAxisIndex: 0
        - color: "#ffb898"
          encode:
            xRef:
              field: dbt_support_requests_created_date_day
            yRef:
              field: dbt_support_requests_count_distinct_request_id
              pivotValues:
                - field: dbt_support_requests_partner_name
                  value: Peat, Fruits and Leaves
          isFilteredOut: false
          label:
            show: false
          type: scatter
          yAxisIndex: 0
        - color: "#7cde96"
          encode:
            xRef:
              field: dbt_support_requests_created_date_day
