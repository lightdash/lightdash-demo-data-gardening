        This dashboard is an example of how you can use a parameter to change
        the grouping dimension of your data. 


        In this case you can select the following grouing dimensions from the
        `orders` table:  

        - `partner_name`

        - `browser`

        - `referrer` as the grouping dimension. 



        Your charts are updated to display the data grouped by the selected
        dimension and the selected dimension is displayed in a big value chart. 
