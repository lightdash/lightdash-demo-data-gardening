  tableCalculations:
    - displayName: MoM Revenue Change (%)
      format:
        separator: default
        type: percent
      name: mom_revenue_change
      template:
        fieldId: dbt_orders_sum_of_basket_total
        orderBy:
          - fieldId: dbt_orders_order_date_month
            order: asc
        type: percent_change_from_previous
