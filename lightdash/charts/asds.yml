chartConfig:
  config:
    eChartsConfig:
      grid:
        containLabel: true
      legend:
        show: true
        type: plain
      series:
        - encode:
            xRef:
              field: dbt_orders_order_date_month
            yRef:
              field: dbt_orders_sum_of_basket_total
          isFilteredOut: false
          name: Sum of basket total
          type: bar
          yAxisIndex: 0
        - encode:
            xRef:
              field: dbt_orders_order_date_month
            yRef:
              field: mom_revenue_change
          isFilteredOut: false
          type: bar
          yAxisIndex: 1
      title:
        text: Month-over-Month % Revenue Change for Redwood Ranch
      xAxis:
        - name: Month
          type: time
      yAxis:
        - name: Total Basket Revenue
          type: value
        - name: "% of something"
    layout:
      flipAxes: false
      showGridX: false
      xField: dbt_orders_order_date_month
      yField:
        - dbt_orders_sum_of_basket_total
        - mom_revenue_change
  type: cartesian
contentType: chart
description: ""
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensions:
    - dbt_orders_order_date_month
  exploreName: dbt_orders
  filters:
    dimensions:
      and:
        - id: 34aca690-0ac9-4a49-bfa7-bd52deb42502
          operator: equals
          target:
            fieldFilterType: string
            fieldId: dbt_orders_partner_name
          values:
            - Redwood Ranch
      id: 2d8cca22-3a76-40e9-b2ed-94d61b959b73
    metrics:
      and: []
      id: 3109ff84-d735-481d-98f3-53d9e1becb5b
  limit: 1000
  metricOverrides: {}
  metrics:
    - dbt_orders_sum_of_basket_total
  sorts:
