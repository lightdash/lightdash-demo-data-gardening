contentType: chart
dashboardSlug: sales-updates
description: >-
  This bar chart displays the total revenue (sum of basket total) contributed by
  each partner, broken down by month for orders placed in 2024. Each bar group
  represents a month, and each bar within the group represents a partner's
  revenue for that month.
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - dbt_orders_order_date_month
    - dbt_orders_partner_name
  exploreName: dbt_orders
  filters:
    dimensions:
      and:
        - id: fe122803-8ce3-4ddd-8d71-7d637cfab9bc
          operator: equals
          target:
            fieldId: dbt_orders_order_date_year
          values:
            - "2024-01-01"
      id: 3f623478-f27a-4335-a77b-67af902607f8
    metrics:
      and: []
      id: 0a0fbcbb-ba8c-461d-bca6-2a1ed3487daa
  limit: 1000
  metricOverrides:
    dbt_orders_sum_of_basket_total:
      formatOptions:
        compact: thousands
        currency: USD
        round: 0
        separator: default
        type: currency
  metrics:
    - dbt_orders_sum_of_basket_total
  sorts:
    - descending: false
      fieldId: dbt_orders_order_date_month
    - descending: true
      fieldId: dbt_orders_sum_of_basket_total
  tableCalculations: []
name: 2024 Monthly Revenue by Partner
pivotConfig:
  columns:
    - dbt_orders_partner_name
slug: 2024-monthly-revenue-by-partner
spaceSlug: "-sales"
tableConfig:
  columnOrder:
    - dbt_orders_order_date_month
    - dbt_orders_partner_name
    - dbt_orders_sum_of_basket_total
tableName: dbt_orders
verification: null
version: 1
