version: 1
entries:
  - id: unique-visitors
    kind: definition
    content: In this project, 'unique visitors' refers to the count of distinct registered user accounts in the dbt_users table, not web sessions or page views. If session-level or page-view-level visitor data is needed, it is not currently available in the semantic layer.
    terms:
      - unique visitors
      - website visitors
      - visitor count
    objects:
      - dbt_users
