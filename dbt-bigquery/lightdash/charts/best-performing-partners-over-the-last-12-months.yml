name: Best Performing Partners Over the Last 12 Months
description: >-
  Displays the top partners by total revenue (sum of basket total) over the past
  12 months. Each bar represents a partner's total revenue.
tableName: dbt_orders
updatedAt: "2026-02-03T11:25:21.843Z"
metricQuery:
  exploreName: dbt_orders
  dimensions:
    - dbt_orders_partner_name
  metrics:
    - dbt_orders_sum_of_basket_total
  filters:
    metrics:
      id: 8c04de82-5454-41f9-b227-6c693752d7f7
      and: []
    dimensions:
      id: 9767e0f3-f6db-4129-960f-7176087e740c
      and:
        - id: 367df744-eccf-4519-b03e-27a83820d4e5
          target:
            fieldId: dbt_orders_order_date
          values:
            - 12
          operator: inThePast
          settings:
            completed: true
            unitOfTime: months
  sorts:
    - fieldId: dbt_orders_sum_of_basket_total
      descending: true
  limit: 10
  metricOverrides:
    dbt_orders_sum_of_basket_total:
      formatOptions:
        type: currency
        compact: millions
        currency: USD
        separator: default
  dimensionOverrides: {}
  tableCalculations: []
  additionalMetrics: []
  customDimensions: []
chartConfig:
  type: cartesian
  config:
    layout:
      xField: dbt_orders_partner_name
      yField:
        - dbt_orders_sum_of_basket_total
      flipAxes: true
    eChartsConfig:
      xAxis:
        - name: Partner
          type: category
      yAxis:
        - name: Revenue
      series:
        - type: bar
          color: "#5C7F9D"
          encode:
            xRef:
              field: dbt_orders_partner_name
            yRef:
              field: dbt_orders_sum_of_basket_total
dashboardSlug: sales-updates
