models:
  - name: dbt_support_requests
    description: 'This table contains information on all the support requests we’ve
      received'
    meta:
      label: Support requests
      pre_aggregates:
        - name: support_requests_daily
          dimensions:
            - reason
          metrics:
            - average_of_feedback_rating
            - count_of_request_id
          time_dimension: request_date
          granularity: DAY
      joins:
        - join: dbt_orders
          sql_on: ${dbt_orders.order_id} = ${dbt_support_requests.order_id}
    columns:
      - name: request_id
        description: 'Unique ID of the request.'
        meta:
          metrics:
            count_distinct_request_id:
              type: count_distinct
              label: Support Tickets
              description: 'Total number of support requests submitted by customers.'
              spotlight:
                visibility: show
                categories:
                  - verified
                  - operations
            count_of_request_id:
              type: count
              label: Support Tickets
              description: >-
                Count of support tickets. dbt_support_requests is one row per
                request_id, so this is equivalent to count_distinct_request_id
                — but it's re-aggregatable, so it can live in pre-aggregates
                and be used in time-window roll-ups without query-time work.
              spotlight:
                visibility: show
                categories:
                  - verified
                  - operations
          dimension:
            type: string
      - name: order_id
        description: 'Unique Order ID that pertains to this request.'
        meta:
          dimension:
            type: string
      - name: request_date
        description: 'Timestamp of request submission by the user.'
        meta:
          dimension:
            sql: >
              timestamp_add(
                ${TABLE}.request_date,
                interval timestamp_diff(current_timestamp(), timestamp '2025-02-13 00:00:00', second) second
              )
            type: timestamp
            time_intervals: [
              'HOUR', 'MINUTE_OF_HOUR_NUM', 'HOUR_OF_DAY_NUM',
              'DAY', 'DAY_OF_WEEK_INDEX', 'DAY_OF_MONTH_NUM', 'DAY_OF_YEAR_NUM', 
              'DAY_OF_WEEK_NAME', 'WEEK', 'WEEK_NUM', 
              'MONTH', 'MONTH_NUM', 'MONTH_NAME',
              'QUARTER', 'QUARTER_NUM', 'QUARTER_NAME',
              'YEAR' ]
      - name: reason
        description: 'Determined cause of request.'
        meta:
          metrics:
            count_of_reason:
              type: count_distinct
              label: Unique Request Reasons
              description: 'Number of distinct support request categories. Know what your customers need help with!'
              spotlight:
                visibility: hide
          dimension:
            type: string
      - name: feedback_rating
        description: 'Feedback rating out of ten as received by post-request user survey.'
        meta:
          metrics:
            average_of_feedback_rating:
              type: average
              label: Customer Satisfaction Score
              description: 'Average customer satisfaction rating from post-support surveys. Keep your customer happiness blooming!'
              spotlight:
                visibility: hide
          dimension:
            type: number
      - name: order_date
        description: ""
        meta:
          dimension:
            type: timestamp
      - name: basket_total
        description: 'Order basket total linked to the support request.'
        meta:
          metrics:
            sum_of_basket_total:
              type: sum
              label: Support Request Revenue
              description: 'Total order revenue associated with support tickets.'
              format: '[$$]#,##0'
              spotlight:
                visibility: hide
          dimension:
            type: number
      - name: profit
        description: 'Order profit linked to the support request.'
        meta:
          metrics:
            sum_of_profit:
              type: sum
              label: Support Request Profit
              description: 'Total order profit associated with support tickets.'
              format: '[$$]#,##0'
              spotlight:
                visibility: hide
          dimension:
            type: number
      - name: referrer
        description: 'Marketing referrer for the order tied to the support request.'
        meta:
          dimension:
            type: string
      - name: partner_id
        description: 'Partner ID for the order tied to the support request.'
        meta:
          dimension:
            type: string
      - name: partner_name
        description: 'Partner name for the order tied to the support request.'
        meta:
          dimension:
            type: string
      - name: partner_commission
        description: 'Partner commission rate for the order tied to the support request.'
        meta:
          dimension:
            type: number
      - name: user_id
        description: 'User ID of the customer who submitted the support request.'
        meta:
          dimension:
            type: string
      - name: email
        description: 'Email of the customer who submitted the support request.'
        meta:
          dimension:
            type: string
      - name: created_date
        description: 'Timestamp when the customer account was created.'
        meta:
          dimension:
            type: timestamp
      - name: browser
        description: 'Browser used by the customer associated with the support request.'
        meta:
          dimension:
            type: string
