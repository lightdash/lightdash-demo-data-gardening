chartConfig:
  config:
    eChartsConfig:
      series:
        - color: "#5C7F9D"
          encode:
            xRef:
              field: dbt_orders_order_date_month
            yRef:
              field: dbt_orders_sum_of_basket_total
          type: bar
      xAxis:
        - name: Month
          type: category
      yAxis:
        - name: Order Value
    layout:
      xField: dbt_orders_order_date_month
      yField:
        - dbt_orders_sum_of_basket_total
  type: cartesian
contentType: chart
dashboardSlug: sales-updates
description: Total order value (revenue) by month
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - dbt_orders_order_date_month
  exploreName: dbt_orders
  filters: {}
  limit: 500
  metricOverrides:
    dbt_orders_average_of_basket_total:
      formatOptions:
        currency: USD
        round: 2
        separator: default
        type: currency
    dbt_orders_sum_of_basket_total:
      formatOptions:
        compact: thousands
        currency: USD
        round: 0
        separator: default
        type: currency
  metrics:
    - dbt_orders_sum_of_basket_total
    - dbt_orders_count_distinct_order_id
    - dbt_orders_average_of_basket_total
  sorts:
    - descending: false
      fieldId: dbt_orders_order_date_month
  tableCalculations:
    - displayName: Partner Rank by Revenue (Top 5 per Quarter)
      format:
        separator: default
        type: default
      name: partner_rank_by_revenue_top_5_per_quarter_
      sql: |-
        ROW_NUMBER() OVER (
          PARTITION BY EXTRACT(QUARTER FROM ${dbt_orders.order_date_month})
          ORDER BY ${dbt_orders.sum_of_basket_total} DESC
        )
      type: number
name: Monthly Order Value
slug: monthly-order-value
spaceSlug: "-sales"
tableConfig:
  columnOrder:
    - dbt_orders_order_date_month
    - dbt_orders_sum_of_basket_total
    - dbt_orders_count_distinct_order_id
    - dbt_orders_average_of_basket_total
    - partner_rank_by_revenue_top_5_per_quarter_
tableName: dbt_orders
verification: null
version: 1
